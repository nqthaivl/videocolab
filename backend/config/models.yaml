    size_gb: 0.2
    note: "Chỉ dành cho Apple Silicon — chạy qua nền tảng tối ưu hóa phần cứng."
    platforms: [darwin-arm64]

  # ── Translation Models ────────────────────────────────────────────────

  - repo_id: "Helsinki-NLP/opus-mt-zh-vi"
    label: "Mô hình dịch Trung→Việt chuyên biệt (Nhẹ & Nhanh)"
    role: Translation
    size_gb: 0.3
    note: "MarianMT được huấn luyện chuyên cho cặp ngôn ngữ Trung-Việt. Nhẹ hơn NLLB (~300MB), dịch Zh→Vi chính xác hơn NLLB-600M. Tải về lần đầu khi chọn engine 'MarianMT Zh→Vi' trong tab Dub."

  - repo_id: "facebook/nllb-200-distilled-1.3B"
    label: "Mô hình dịch đa ngôn ngữ chất lượng cao (200 ngôn ngữ)"
    role: Translation
    size_gb: 5.2
    note: "NLLB-200 1.3B — chất lượng dịch tốt hơn đáng kể so với bản 600M, đặc biệt với cặp Trung-Việt và các ngôn ngữ châu Á. Cần ~5.2GB dung lượng. Tải về lần đầu khi chọn engine 'NLLB-200 1.3B' trong tab Dub."

